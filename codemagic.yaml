workflows:
  ios-ipa-unsigned:
    name: River iOS Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter config --enable-swift-package-manager
          flutter pub get
      - name: Build iOS app without signing
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER
      - name: Pack unsigned IPA
        script: |
          APP_PATH=""
          for candidate in \
            build/ios/iphoneos/*.app \
            build/ios/Release-iphoneos/*.app \
            ios/build/Release-iphoneos/*.app; do
            if [ -d "$candidate" ]; then
              APP_PATH="$candidate"
              break
            fi
          done

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -type d -name "*.app" | head -n 1 || true)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "No .app bundle found under build/."
            echo "Debug list:"
            find build -maxdepth 6 -type d | sort || true
            find ios -maxdepth 6 -type d | sort || true
            exit 1
          fi

          echo "Using app bundle: $APP_PATH"
          mkdir -p build/ios/unsigned
          rm -rf build/ios/unsigned/Payload
          rm -f build/ios/unsigned/River-unsigned.ipa
          mkdir -p build/ios/unsigned/Payload
          cp -R "$APP_PATH" build/ios/unsigned/Payload/
          cd build/ios/unsigned
          zip -r River-unsigned.ipa Payload
    artifacts:
      - build/ios/unsigned/*.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-ipa:
    name: River iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Change this if your App Store Connect integration name is different.
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Replace with your real iOS bundle identifier.
        BUNDLE_ID: com.mikannqaq.river
    scripts:
      - name: Apply bundle identifier
        script: |
          if [ "$BUNDLE_ID" != "com.mikannqaq.river" ]; then
            sed -i '' "s/com.mikannqaq.river.RunnerTests/$BUNDLE_ID.RunnerTests/g" ios/Runner.xcodeproj/project.pbxproj
            sed -i '' "s/com.mikannqaq.river/$BUNDLE_ID/g" ios/Runner.xcodeproj/project.pbxproj
          fi
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter config --enable-swift-package-manager
          flutter pub get
      - name: Build IPA
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

