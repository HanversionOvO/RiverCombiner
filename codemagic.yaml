workflows:
  ios-ipa-unsigned:
    name: River iOS Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS app without signing
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          flutter build ios --release --config-only --build-number=$BUILD_NUMBER
          cd ios
          pod install
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath ../build/ios/unsigned/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO
          cd ..
      - name: Pack unsigned IPA
        script: |
          APP_PATH="build/ios/unsigned/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          rm -rf build/ios/unsigned
          mkdir -p build/ios/unsigned/Payload
          cp -R "$APP_PATH" build/ios/unsigned/Payload/
          cd build/ios/unsigned
          zip -r River-unsigned.ipa Payload
    artifacts:
      - build/ios/unsigned/*.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-ipa:
    name: River iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Change this if your App Store Connect integration name is different.
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Replace with your real iOS bundle identifier.
        BUNDLE_ID: com.example.river
    scripts:
      - name: Apply bundle identifier
        script: |
          if [ "$BUNDLE_ID" != "com.example.river" ]; then
            sed -i '' "s/com.example.river.RunnerTests/$BUNDLE_ID.RunnerTests/g" ios/Runner.xcodeproj/project.pbxproj
            sed -i '' "s/com.example.river/$BUNDLE_ID/g" ios/Runner.xcodeproj/project.pbxproj
          fi
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build IPA
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
