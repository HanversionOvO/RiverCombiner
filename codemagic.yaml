workflows:
  ios-ipa:
    name: River iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Change this if your App Store Connect integration name is different.
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Replace with your real iOS bundle identifier.
        BUNDLE_ID: com.example.river
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build IPA
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
